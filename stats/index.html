<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats & History - TypingTest</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; max-width: 900px; width: 100%; }
  .stats-grid .card { background: var(--panel); border-radius: 10px; padding: 16px; text-align: center; }
  .stats-grid .card .value { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .stats-grid .card .label { color: var(--dim); font-size: .8rem; margin-top: 4px; }
  table { border-collapse: collapse; width: 100%; max-width: 900px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #2a2e38; font-size: .85rem; }
  th { color: var(--dim); font-weight: 600; }
  .export-row { display: flex; gap: 12px; }
  #chart { max-width: 900px; width: 100%; height: 160px; background: var(--panel); border-radius: 10px; }
</style>
</head>
<body>
<div id="site-header"></div>
<main class="page-main">
  <h1>Your Progress</h1>
  <div class="stats-grid" id="summary-cards"></div>

  <svg id="chart"></svg>

  <div class="export-row">
    <button class="secondary" id="export-json">Export JSON</button>
    <button class="secondary" id="export-csv">Export CSV</button>
    <button class="secondary" id="reset-stats">Reset Statistics</button>
  </div>

  <table>
    <thead>
      <tr><th>Date</th><th>Lang</th><th>WPM</th><th>CPM</th><th>Accuracy</th><th>Errors</th><th>Duration</th></tr>
    </thead>
    <tbody id="history-body"></tbody>
  </table>
</main>
<div id="site-footer"></div>
<script src="../js/app.js"></script>
<script src="../js/engine.js"></script>
<script>
  const history = getHistory().slice().reverse();
  const bestEn = getBest("english");
  const bestBn = getBest("bangla");

  function computeStreak(hist) {
    const days = [...new Set(hist.map(r => r.date.slice(0, 10)))].sort().reverse();
    if (days.length === 0) return 0;
    let streak = 0;
    let cursor = new Date();
    for (const day of days) {
      const cursorStr = cursor.toISOString().slice(0, 10);
      if (day === cursorStr) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else if (streak === 0 && day < cursorStr) {
        break;
      } else {
        break;
      }
    }
    return streak;
  }

  const totalTests = history.length;
  const totalWords = history.reduce((s, r) => s + Math.round(r.correctChars / 5), 0);
  const totalChars = history.reduce((s, r) => s + r.totalChars, 0);
  const avgWpm = totalTests ? Math.round(history.reduce((s, r) => s + r.wpm, 0) / totalTests) : 0;
  const avgAcc = totalTests ? Math.round(history.reduce((s, r) => s + r.accuracy, 0) / totalTests) : 0;
  const streak = computeStreak(history);

  const cards = [
    ["Total Tests", totalTests],
    ["Best WPM (EN)", bestEn ? bestEn.wpm : "-"],
    ["Best WPM (BN)", bestBn ? bestBn.wpm : "-"],
    ["Average WPM", avgWpm],
    ["Average Accuracy", avgAcc + "%"],
    ["Total Words", totalWords],
    ["Total Characters", totalChars],
    ["Streak (days)", streak],
  ];
  document.getElementById("summary-cards").innerHTML = cards.map(([label, value]) =>
    `<div class="card"><div class="value">${value}</div><div class="label">${label}</div></div>`
  ).join("");

  document.getElementById("history-body").innerHTML = history.slice(0, 100).map(r => `
    <tr>
      <td>${new Date(r.date).toLocaleString()}</td>
      <td>${r.lang}</td>
      <td>${r.wpm}</td>
      <td>${r.cpm}</td>
      <td>${r.accuracy}%</td>
      <td>${r.errors}</td>
      <td>${r.duration}s</td>
    </tr>`).join("") || `<tr><td colspan="7">No tests taken yet.</td></tr>`;

  // Simple WPM sparkline (last 30 tests, chronological)
  (function drawChart() {
    const svg = document.getElementById("chart");
    const data = history.slice(0, 30).reverse();
    if (data.length < 2) return;
    const w = svg.clientWidth || 900, h = 160, pad = 20;
    svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
    const maxWpm = Math.max(...data.map(d => d.wpm), 10);
    const points = data.map((d, i) => {
      const x = pad + (i / (data.length - 1)) * (w - pad * 2);
      const y = h - pad - (d.wpm / maxWpm) * (h - pad * 2);
      return `${x},${y}`;
    }).join(" ");
    svg.innerHTML = `<polyline fill="none" stroke="var(--accent)" stroke-width="2" points="${points}" />`;
  })();

  document.getElementById("export-json").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(getHistory(), null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "typing-history.json";
    a.click();
  });

  document.getElementById("export-csv").addEventListener("click", () => {
    const rows = [["date", "lang", "wpm", "cpm", "accuracy", "errors", "duration"]];
    getHistory().forEach(r => rows.push([r.date, r.lang, r.wpm, r.cpm, r.accuracy, r.errors, r.duration]));
    const csv = rows.map(r => r.join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "typing-history.csv";
    a.click();
  });

  document.getElementById("reset-stats").addEventListener("click", () => {
    if (confirm("Reset all typing statistics? This cannot be undone.")) {
      localStorage.removeItem("typingHistory");
      localStorage.removeItem("typingBest_english");
      localStorage.removeItem("typingBest_bangla");
      location.reload();
    }
  });
</script>
<script src="../js/layout.js" data-base="../"></script>
</body>
</html>
